name: build-httptools-arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # clone 源码（必须是项目根目录）
      - name: Clone httptools
        run: git clone https://github.com/MagicStack/httptools.git .

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # build tool
      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel==2.19.0

      # DEBUG：查看实际可用 build targets（可选但强烈建议保留一次）
      - name: Print build identifiers
        run: cibuildwheel --print-build-identifiers
        env:
          CIBW_PLATFORM: windows
          CIBW_ARCHS_WINDOWS: ARM64
          CIBW_PRERELEASE_PYTHONS: "1"

      # build
      - name: Build wheels
        env:
          CIBW_PLATFORM: windows
          CIBW_ARCHS_WINDOWS: ARM64
          CIBW_BUILD: cp314*
          CIBW_PRERELEASE_PYTHONS: "1"
          CIBW_ENVIRONMENT: DISTUTILS_USE_SDK=1
        run: cibuildwheel --output-dir wheelhouse

      # upload artifact
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: httptools-arm64-wheel
          path: wheelhouse/*.whl
