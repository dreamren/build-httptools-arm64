name: Build with cibuildwheel

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on windows-latest
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 宿主 Python 版本随意，cibuildwheel 会自己下 3.14

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # 只编译 Python 3.14 的 Windows ARM64 版本
          # CP314-* 匹配 Python 3.14
          # win_arm64 匹配目标架构
          CIBW_BUILD: "cp314-win_arm64"
          
          # 强制 cibuildwheel 在构建前安装必要的编译依赖
          CIBW_BEFORE_BUILD: "pip install cython setuptools"
          
          # 针对 Windows ARM64 的交叉编译修复
          # cibuildwheel 会自动调用 vcvarsall.bat x64_arm64
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"

      - uses: actions/upload-artifact@v4
        with:
          name: httptools-arm64-wheels
          path: ./wheelhouse/*.whl
