name: build-httptools-arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # clone 源码
      - name: Clone httptools
        run: git clone https://github.com/MagicStack/httptools.git .

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # 安装最新版 cibuildwheel
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -U cibuildwheel

      # 官方推荐：先打印 build identifiers（调试必备）
      - name: Debug build identifiers
        env:
          CIBW_PLATFORM: windows
          CIBW_ARCHS_WINDOWS: ARM64
          CIBW_PRERELEASE_PYTHONS: "1"
        run: cibuildwheel --print-build-identifiers

      # 构建
      - name: Build wheels
        env:
          CIBW_PLATFORM: windows
          CIBW_ARCHS_WINDOWS: ARM64
          CIBW_BUILD: cp314*
          CIBW_PRERELEASE_PYTHONS: "1"
          CIBW_SKIP: pp* cp36* cp37* cp38* cp39* cp310* cp311* cp312* cp313*
          CIBW_ENVIRONMENT: DISTUTILS_USE_SDK=1
        run: cibuildwheel --output-dir wheelhouse

      # 上传产物
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: httptools-arm64-wheel
          path: wheelhouse/*.whl
