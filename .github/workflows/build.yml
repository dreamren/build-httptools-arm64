name: Build httptools Windows ARM64 (Python 3.14)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout httptools
        uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # 用于运行编译脚本的宿主

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Fetch Python ARM64 Libraries via NuGet
        shell: pwsh
        run: |
          # 使用 NuGet 下载 ARM64 版本的 Python 开发包
          # 注意：这里使用了 3.14.0-alpha1，请根据实际版本调整，或使用 -Prerelease 参数
          mkdir python_arm64_dev
          nuget install pythonarm64 -Version 3.14.0-alpha1 -OutputDirectory python_arm64_dev -Prerelease
          
          # 定位 lib 和 include 路径
          $pkgPath = Get-ChildItem -Path "python_arm64_dev\pythonarm64*" | Select-Object -First 1
          echo "PYTHON_ARM64_LIB=$($pkgPath.FullName)\tools" >> $env:GITHUB_ENV
          echo "PYTHON_ARM64_INC=$($pkgPath.FullName)\tools\include" >> $env:GITHUB_ENV

      - name: Compile with Forced MSVC ARM64 Environment
        shell: cmd
        env:
          DISTUTILS_USE_SDK: "1"
          MSSdk: "1"
          # 强制 setuptools 认为自己在 ARM64 环境下执行
          _PYTHON_SYSCONFIGDATA_NAME: "_sysconfigdata__win_arm64"
        run: |
          :: 1. 初始化交叉编译环境
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          
          :: 2. 注入从 NuGet 获取的 ARM64 路径
          set "INCLUDE=%PYTHON_ARM64_INC%;%INCLUDE%"
          set "LIB=%PYTHON_ARM64_LIB%;%LIB%"
          
          :: 3. 验证编译器（应显示 Target: aarch64）
          cl.exe
          
          :: 4. 编译并打包
          python setup.py bdist_wheel --plat-name win_arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-py314-win_arm64
          path: dist/*.whl
