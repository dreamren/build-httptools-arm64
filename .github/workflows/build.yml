name: Build httptools Windows ARM64 (Python 3.14.4)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout httptools
        uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # 宿主环境

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Fetch Python 3.14.4 ARM64 via NuGet
        shell: pwsh
        run: |
          # 显式下载指定的 3.14.4 预览版
          mkdir py_dev
          nuget install pythonarm64 -Version 3.14.4 -OutputDirectory py_dev -Prerelease
          
          # 自动定位路径（NuGet 会创建一个名为 pythonarm64.3.14.4 的文件夹）
          $pkgPath = Get-ChildItem -Path "py_dev\pythonarm64*" | Select-Object -First 1
          $fullPath = $pkgPath.FullName
          
          echo "ARM64_LIB=$fullPath\tools" >> $env:GITHUB_ENV
          echo "ARM64_INC=$fullPath\tools\include" >> $env:GITHUB_ENV
          
          # 打印调试信息，确保路径正确
          Write-Host "Target Lib Path: $fullPath\tools"
          ls "$fullPath\tools\python*.lib"

      - name: Compile with Forced MSVC ARM64
        shell: cmd
        env:
          DISTUTILS_USE_SDK: "1"
          MSSdk: "1"
          # 关键：强制 Python 构建系统切换到 win-arm64 逻辑
          _PYTHON_SYSCONFIGDATA_NAME: "_sysconfigdata__win_arm64"
        run: |
          :: 1. 初始化交叉编译环境
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          
          :: 2. 强行覆盖环境变量，让链接器找不到 x64 的库
          set "INCLUDE=%ARM64_INC%;%INCLUDE%"
          set "LIB=%ARM64_LIB%;%LIB%"
          
          :: 3. 验证编译器目标
          cl.exe
          
          :: 4. 执行编译
          :: 使用 --plat-name 确保 Wheel 的文件名后缀为 win_arm64
          python setup.py bdist_wheel --plat-name win_arm64

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: httptools-3.14.4-win_arm64
          path: dist/*.whl
