name: Build httptools for Windows ARM64 (Python 3.14)

on:
  workflow_dispatch: # 手动触发

jobs:
  build-arm64:
    runs-on: windows-latest
    
    steps:
      - name: Checkout (Optional)
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # 确保 Python 3.14 已发布或在 actions 中可用
          check-latest: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Download httptools source
        run: |
          # 从 GitHub 下载最新的源码
          git clone --recursive https://github.com/MagicStack/httptools.git
          cd httptools

      - name: Setup MSVC for ARM64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64 # 在 x64 机器上通过交叉编译器编译 arm64

      - name: Build Wheel
        working-directory: ./httptools
        run: |
          # 设置环境变量以强制指定平台名称
          $env:DISTUTILS_USE_SDK=1
          $env:MSSdk=1
          
          # 编译命令：指定平台为 win_arm64
          # --no-deps 确保不下载依赖，--platform 强制标记
          python setup.py bdist_wheel --plat-name win_arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-py314-win_arm64
          path: httptools/dist/*.whl
