name: Build httptools for Windows ARM64 (Python 3.14)

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: windows-latest
    
    steps:
      - name: Checkout httptools
        uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python (Host for Build Tools)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Download Python ARM64 Libraries
        run: |
          # 下载 ARM64 版本的 Python 嵌入式包，用于获取 .lib 和 .h 文件
          # 注意：URL 需根据 Python 3.14 实际发布的下载地址调整
          curl -L -o python_arm64.zip https://www.python.org/ftp/python/3.14.0/python-3.14.0-embed-arm64.zip
          mkdir python_arm64
          tar -xf python_arm64.zip -C python_arm64
          
          # 获取开发头文件 (Include)
          # 嵌入式包通常不含头文件，我们需要从 Nuget 或官网再取一份 Include
          curl -L -o python_include.zip https://www.python.org/ftp/python/3.14.0/python-3.14.0-amd64-sdk.zip
          mkdir python_include
          tar -xf python_include.zip -C python_include

      - name: Build Wheel for ARM64
        shell: pwsh
        run: |
          # 1. 启动 MSVC 交叉编译环境
          # ilammy/msvc-dev-cmd 的 actions 版本在这里有时会有环境覆盖问题
          # 我们直接手动设置关键的环境变量
          
          $python_root = "$(Get-Location)\python_arm64"
          $include_root = "$(Get-Location)\python_include"
          
          # 2. 强制指定编译器和链接器的寻址路径
          $env:INCLUDE = "$include_root\Include;$env:INCLUDE"
          $env:LIB = "$python_root;$env:LIB"
          
          # 3. 设置变量告诉 setuptools 我们在交叉编译
          $env:DISTUTILS_USE_SDK = "1"
          $env:MSSdk = "1"
          $env:_PYTHON_SYSCONFIGDATA_NAME = "_sysconfigdata__win_arm64"
          
          # 4. 执行编译
          # 使用 --plat-name 强制指定架构标签
          python setup.py bdist_wheel --plat-name win_arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-py314-win_arm64
          path: dist/*.whl
