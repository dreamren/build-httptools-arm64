name: Build httptools Windows ARM64

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: "ARM64"
          CIBW_BUILD: "cp314-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 重要：禁用 PEP 517 构建隔离
          # 这样 build 会使用 before_build 环境中已有的 cython，避免重复下载和编译器丢失
          CIBW_CONFIG_SETTINGS_WINDOWS: "--build-option=--no-build-isolation"
          
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            _PYTHON_SYSCONFIGDATA_NAME="_sysconfigdata__win_arm64"
          
          # 在构建环境准备好后，显式安装最新版依赖
          CIBW_BEFORE_BUILD: "pip install cython>=3.0.0 setuptools>=70.0.0 wheel"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-win-arm64
          path: ./wheelhouse/*.whl
