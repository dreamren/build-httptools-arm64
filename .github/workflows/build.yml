name: Build httptools Windows ARM64

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: "ARM64"
          CIBW_BUILD: "cp314-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 1. 核心修正：使用环境变量彻底关闭隔离环境
          # 这会强制 cibuildwheel 在其创建的 venv 中直接运行编译，
          # 而不再额外创建一层会导致编译器丢失的临时隔离环境。
          PIP_NO_BUILD_ISOLATION: "0" # 或者直接依赖下面的 before_build 环境变量同步
          
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            _PYTHON_SYSCONFIGDATA_NAME="_sysconfigdata__win_arm64"
          
          # 2. 这里的顺序很重要：cibuildwheel 会在它的 venv 里执行这个
          # 确保 ARM64 编译所需的工具都在这个 venv 内部可用
          CIBW_BEFORE_BUILD: "pip install cython>=3.0.0 setuptools>=70.0.0 wheel"

          # 3. 针对 httptools 这种包含子模块的项目，强制 setuptools 识别
          CIBW_BUILD_FRONTEND: "pip" # 改用 pip 作为前端通常对交叉编译支持更稳健

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-win-arm64
          path: ./wheelhouse/*.whl
