name: Force Build httptools Windows ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout httptools
        uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Host Python (3.14)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython setuptools wheel

      - name: Prepare ARM64 Python SDK
        shell: pwsh
        run: |
          # 1. 下载 ARM64 运行环境（用于获取 .lib 文件）
          curl.exe -L -o py_arm64.zip https://www.python.org/ftp/python/3.14.0/python-3.14.0-embed-arm64.zip
          Expand-Archive py_arm64.zip -DestinationPath py_arm64
          
          # 2. 下载 Python 源码/SDK（用于获取 .h 头文件）
          # 注意：3.14 路径请根据实际发布版本微调，若 404 请检查官网
          curl.exe -L -o py_inc.zip https://www.python.org/ftp/python/3.14.0/python-3.14.0-amd64-sdk.zip
          Expand-Archive py_inc.zip -DestinationPath py_inc

      - name: Compile with Forced MSVC ARM64 Environment
        shell: cmd # 使用 CMD 方便直接 call bat 脚本
        env:
          # 告诉 Python 构建工具使用我们手动设置的 SDK 环境
          DISTUTILS_USE_SDK: "1"
          MSSdk: "1"
        run: |
          :: 1. 强制初始化 MSVC 为交叉编译模式 (Host x64 -> Target ARM64)
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          
          :: 2. 覆盖环境变量，强制指向 ARM64 的库和头文件
          set "INCLUDE=%CD%\py_inc\Include;%INCLUDE%"
          set "LIB=%CD%\py_arm64;%LIB%"
          
          :: 3. 检查编译器是否正确加载 (应显示 Target: aarch64-pc-windows-msvc)
          cl.exe
          
          :: 4. 执行编译并强制指定平台标签
          python setup.py bdist_wheel --plat-name win_arm64
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: httptools-win_arm64
          path: dist/*.whl
