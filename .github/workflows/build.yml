name: Build httptools Windows ARM64

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: "ARM64"
          CIBW_BUILD: "cp314-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 1. 强制关闭隔离，使用我们在 before_build 准备好的环境
          PIP_NO_BUILD_ISOLATION: "0"

          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            _PYTHON_SYSCONFIGDATA_NAME="_sysconfigdata__win_arm64"
            # 显式指向 ARM64 链接器标志，防止混淆
            LDFLAGS="/LIBPATH:C:/Users/runneradmin/AppData/Local/pypa/cibuildwheel/Cache/nuget-cpython/python.3.14.3/tools/libs"

          # 2. 关键修正：在构建前强制加载 MSVC ARM64 变量
          # 我们先用 vcvarsall 初始化环境，再在该环境中安装依赖
          CIBW_BEFORE_BUILD_WINDOWS: >
            call "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvarsall.bat" x64_arm64 && 
            pip install cython>=3.0.11 setuptools>=75.0.0 wheel

          CIBW_BUILD_FRONTEND: "pip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-win-arm64
          path: ./wheelhouse/*.whl
