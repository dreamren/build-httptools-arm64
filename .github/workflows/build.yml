name: Build httptools Windows ARM64 (Ultimate)

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on windows-latest
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      # 1. 核心步骤：强制启用 MSVC 的 x64_arm64 交叉编译环境
      - name: Enable MSVC ARM64 Cross-Compiler
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # 架构与目标设置
          CIBW_ARCHS_WINDOWS: "ARM64"
          CIBW_BUILD: "cp314-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 2. 环境变量注入：将 msvc-dev-cmd 激活的变量传递给 cibuildwheel
          # 这样即便在隔离的 venv 里，pip 也能通过 SDK 模式找到 cl.exe
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            _PYTHON_SYSCONFIGDATA_NAME="_sysconfigdata__win_arm64"
            CFLAGS="-DCYTHON_FREETHREADING_COMPATIBLE=1"

          # 3. 彻底禁用隔离，强制使用宿主环境预装好的编译工具
          PIP_NO_BUILD_ISOLATION: "0"
          
          # 4. 构建前准备：安装最新版编译依赖
          # 确保 Cython 能够处理 Python 3.14 的新特性
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cython>=3.0.11 setuptools>=75.1.0 wheel

          # 5. 使用 pip 作为前端，对交叉编译路径的兼容性最好
          CIBW_BUILD_FRONTEND: "pip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-3.14-win_arm64
          path: ./wheelhouse/*.whl
