name: Build with cibuildwheel

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on windows-latest
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # 宿主 Python 版本随意，cibuildwheel 会自己下 3.14

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # 1. 核心修正：手动开启 ARM64 架构支持
          CIBW_ARCHS_WINDOWS: "ARM64"
          
          # 2. 指定构建目标
          CIBW_BUILD: "cp314-win_arm64"
          
          # 3. 这里的环境设置对于交叉编译非常重要
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            
          # 4. 构建前的依赖安装
          CIBW_BEFORE_BUILD: "pip install cython setuptools"
          
          # 5. 跳过测试（因为 x64 机器跑不了 ARM64 二进制文件）
          CIBW_SKIP: "*-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"

      - uses: actions/upload-artifact@v4
        with:
          name: httptools-arm64-wheels
          path: ./wheelhouse/*.whl
