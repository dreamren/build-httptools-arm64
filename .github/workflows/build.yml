name: Build httptools Windows ARM64 (cibuildwheel)

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: MagicStack/httptools
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # 仅作为运行 cibuildwheel 的宿主

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # 1. 允许 ARM64 架构
          CIBW_ARCHS_WINDOWS: "ARM64"
          
          # 2. 只构建 cp314
          CIBW_BUILD: "cp314-win_arm64"
          
          # 3. 这里的 CIBW_SKIP 必须为空，或者不要包含 win_arm64
          CIBW_SKIP: ""
          
          # 4. 交叉编译必须跳过测试，否则会因架构不匹配报错
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 5. 编译环境配置
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
          
          # 6. httptools 必须安装 cython 才能编译
          CIBW_BEFORE_BUILD: "pip install cython setuptools"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: httptools-win-arm64
          path: ./wheelhouse/*.whl
