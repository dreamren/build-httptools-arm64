name: Build OpenCV-Python Windows ARM64

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build OpenCV for Windows ARM64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # 注意：opencv-python 建议使用 --recursive 抓取所有子模块（包括 opencv 本身）
          repository: opencv/opencv-python
          submodules: recursive
          fetch-depth: 0

      # 1. 核心：启用 MSVC x64_arm64 交叉编译工具链
      - name: Enable MSVC ARM64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          python -m pip install cibuildwheel==3.4.1 cmake ninja
          
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: "ARM64"
          CIBW_BUILD: "cp314-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 核心环境变量注入
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            _PYTHON_SYSCONFIGDATA_NAME="_sysconfigdata__win_arm64"
            CMAKE_GENERATOR="Ninja"
            OPENCV_PYTHON_SKIP_DETECTION="ON"
            # 这种写法是 OpenCV 脚本识别的 CMake 参数传递方式
            CMAKE_ARGS="-DCMAKE_SYSTEM_NAME=Windows -DCMAKE_SYSTEM_PROCESSOR=ARM64 -DOPENCV_FORCE_PYTHON_LIBS=ON -DBUILD_opencv_world=ON"

          # 关闭构建隔离，确保 setup.py 能看到 venv 里的包
          PIP_NO_BUILD_ISOLATION: "0"
          
          # 修正：必须安装 scikit-build 而不仅仅是 scikit-build-core
          # 另外一定要带上 ninja，它是交叉编译最稳定的生成器
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cython>=3.0.11 setuptools>=75.1.0 wheel cmake ninja numpy>=2.1.0 scikit-build

          CIBW_BUILD_FRONTEND: "pip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-3.14-win_arm64
          path: ./wheelhouse/*.whl
