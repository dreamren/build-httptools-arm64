name: Build OpenCV-Python Windows ARM64

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build OpenCV for Windows ARM64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # 注意：opencv-python 建议使用 --recursive 抓取所有子模块（包括 opencv 本身）
          repository: opencv/opencv-python
          submodules: recursive
          fetch-depth: 0

      # 1. 核心：启用 MSVC x64_arm64 交叉编译工具链
      - name: Enable MSVC ARM64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          python -m pip install cibuildwheel==3.4.1 cmake ninja
          
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_WINDOWS: "ARM64"
          CIBW_BUILD: "cp314-win_arm64"
          CIBW_TEST_SKIP: "*-win_arm64"
          
          # 1. 核心修正：直接通过环境变量传递 CMake 参数，而不是命令行
          CIBW_ENVIRONMENT_WINDOWS: >
            DISTUTILS_USE_SDK="1"
            MSSdk="1"
            _PYTHON_SYSCONFIGDATA_NAME="_sysconfigdata__win_arm64"
            CMAKE_GENERATOR="Ninja"
            OPENCV_PYTHON_SKIP_DETECTION="ON"
            # 将所有 CMake 参数写在这里，注意 Windows 下使用分号分隔多个参数
            CMAKE_ARGS="-DCMAKE_SYSTEM_NAME=Windows -DCMAKE_SYSTEM_PROCESSOR=ARM64 -DOPENCV_FORCE_PYTHON_LIBS=ON -DBUILD_opencv_world=ON"

          # 2. 依然保持关闭隔离，使用我们预装的环境
          PIP_NO_BUILD_ISOLATION: "0"
          
          # 3. 构建前准备
          # 增加 scikit-build-core，这是目前 OpenCV 推荐的现代构建后端依赖
          CIBW_BEFORE_BUILD_WINDOWS: >
            pip install cython>=3.0.11 setuptools>=75.1.0 wheel scikit-build-core numpy>=2.1.0

          # 4. 移除之前报错的 CIBW_CONFIG_SETTINGS
          CIBW_BUILD_FRONTEND: "pip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-3.14-win_arm64
          path: ./wheelhouse/*.whl
